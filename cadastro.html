<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Elite Boots</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header compact-header">
    <a class="brand" href="index.html"><span class="brand-mark">EB</span><span>Elite Boots</span></a>
    <nav class="main-nav"><a href="index.html#produtos">Produtos</a><a href="login.html">Login</a></nav>
  </header>
  <main class="account-shell">
    <form class="account-panel">
      <span class="eyebrow">Novo cliente</span>
      <h1>Cadastro</h1>
      <label>Nome<input type="text" placeholder="Seu nome"></label>
      <label>E-mail<input type="email" placeholder="voce@email.com"></label>
      <label>Telefone<input type="tel" placeholder="(00) 00000-0000"></label>
      <button type="submit">Criar conta</button>
    </form>
  </main>
</body>
</html>
